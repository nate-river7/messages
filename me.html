<!DOCTYPE html>
<html>

<head>

    <title> Messenger </title>

</head>

<body>
    <h1> Messages </h1>

    
    Messages:
    {% for msg in data %}
    <div class="msg">
        <span class="name">
            {{ msg.name }} : {{ msg.message }}
        </span>
    </div>
    {% endfor %}
    <form action="{{ url_for('/send')}}" method="POST">
        <input type = "text" name = 'message'>
        
        <button type="submit"> Send </button>
    </form>
    
    <br> 

</body>

</html>
